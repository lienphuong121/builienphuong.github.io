<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Table</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap');

        :root {
            --bg: #050505;
            --accent: #00d2ff;
            --error: #ff3333;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg); color: #fff; padding: 20px;
        }

        .aurora {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 80% 20%, #1e3c72 0%, transparent 40%),
                        radial-gradient(circle at 20% 80%, #2a5298 0%, transparent 40%);
            filter: blur(100px); opacity: 0.3;
        }

        .container {
            width: 100%; max-width: 500px;
            background: var(--glass); backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 32px;
            padding: 50px; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center;
        }

        h2 { font-weight: 200; letter-spacing: 5px; opacity: 0.5; font-size: 0.8rem; margin-bottom: 40px; }

        .input-wrapper { margin-bottom: 40px; }
        .input-wrapper label { font-size: 0.65rem; letter-spacing: 2px; opacity: 0.4; display: block; margin-bottom: 10px; }

        input {
            width: 80px; background: transparent; border: none;
            border-bottom: 1px solid var(--border);
            padding: 10px; color: var(--accent); font-size: 2.5rem;
            font-weight: 100; text-align: center; outline: none; transition: 0.3s;
        }

        input:focus { border-bottom-color: #fff; width: 120px; }
        input.invalid { border-bottom-color: var(--error); color: var(--error); animation: shake 0.4s; }

        @keyframes shake { 0%, 100% {transform: translateX(0)} 25% {transform: translateX(-5px)} 75% {transform: translateX(5px)} }

      
        .result-area {
            margin-top: 30px; display: grid; gap: 8px;
            opacity: 0; transform: translateY(20px); transition: 0.5s;
        }

        .result-area.active { opacity: 1; transform: translateY(0); }

        .row {
            display: grid; grid-template-columns: 1fr auto 1fr auto 1fr;
            padding: 12px 20px; background: rgba(255,255,255,0.02);
            border-radius: 12px; font-size: 1rem; font-weight: 300;
            border: 1px solid transparent; transition: 0.2s;
        }

        .row:hover { background: rgba(255,255,255,0.05); border-color: var(--border); }
        .row b { color: var(--accent); font-weight: 600; }
        .error-hint { color: var(--error); font-size: 0.75rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="aurora"></div>

<div class="container">
    <h2>MULTIPLICATION ENGINE</h2>
    
    <div class="input-wrapper">
        <label>SELECT BASE NUMBER</label>
        <input type="text" id="numInput" maxlength="2" placeholder="0" oninput="generateTable()">
        <div id="error" class="error-hint">⚠ Vui lòng nhập một số hợp lệ</div>
    </div>

    <div id="display" class="result-area">
        </div>
</div>

<script>
    function generateTable() {
        const input = document.getElementById('numInput');
        const display = document.getElementById('display');
        const error = document.getElementById('error');
        const val = input.value;

    
        display.innerHTML = '';
        display.classList.remove('active');
        input.classList.remove('invalid');
        error.style.display = 'none';

        if (val === "") return;

    
        if (isNaN(val)) {
            input.classList.add('invalid');
            error.style.display = 'block';
            return;
        }

        const n = parseInt(val);
        display.classList.add('active');

        for (let i = 1; i <= 10; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <span>${n}</span>
                <span style="opacity:0.3">×</span>
                <span>${i}</span>
                <span style="opacity:0.3">=</span>
                <b>${n * i}</b>
            `;
        
            row.style.transitionDelay = (i * 0.05) + "s";
            display.appendChild(row);
        }
    }
</script>

</body>
</html>
