<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Ticketbox Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ================= CSS CHUNG (SPLIT SCREEN) ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background-color: #fff; color: #333; }
        
        /* Cột trái: Hình ảnh */
        .split-left { flex: 1; background: url('https://images.unsplash.com/photo-1540039155732-d68241511059?auto=format&fit=crop&q=80&w=1200') center/cover no-repeat; position: relative; }
        .split-left::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,177,79,0.6)); }
        
        /* Cột phải: Form */
        .split-right { width: 500px; padding: 50px; display: flex; flex-direction: column; justify-content: center; overflow-y: auto; }
        
        .form-header { margin-bottom: 30px; text-align: center; }
        .form-header h2 { font-size: 28px; color: #00b14f; margin-bottom: 10px; }
        .form-header p { color: #666; font-size: 15px; }

        /* Social Buttons */
        .social-login { display: flex; gap: 15px; margin-bottom: 25px; }
        .btn-social { flex: 1; padding: 12px; border-radius: 4px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid #ddd; background: #fff; transition: 0.3s; }
        .btn-social:hover { background: #f5f5f5; }
        .btn-social.google { color: #db4437; }
        .btn-social.facebook { color: #4267B2; }

        /* Dòng kẻ Hoặc */
        .divider { display: flex; align-items: center; text-align: center; margin-bottom: 25px; color: #aaa; font-size: 14px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #ddd; }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        /* Form Inputs */
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; outline: none; transition: border 0.3s; }
        .form-group input:focus { border-color: #00b14f; }
        
        /* Icon con mắt */
        .toggle-pwd { position: absolute; right: 15px; top: 38px; cursor: pointer; color: #888; }
        
        /* Báo lỗi Validation */
        .error-msg { color: #ff4d4f; font-size: 13px; margin-top: 5px; display: none; }
        .form-group.error input { border-color: #ff4d4f; background: #fff2f0; }
        .form-group.error .error-msg { display: block; }

        /* Nút Submit & Link */
        .btn-submit { width: 100%; padding: 14px; background: #00b14f; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: #009040; }
        .form-footer { margin-top: 25px; text-align: center; font-size: 14px; color: #666; }
        .form-footer a { color: #00b14f; font-weight: 500; text-decoration: none; }
        .form-footer a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .split-left { display: none; } /* Ẩn ảnh trên mobile */
            .split-right { width: 100%; padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="split-left"></div>
    
    <div class="split-right">
        <div class="form-header">
            <h2>Đăng Nhập</h2>
            <p>Chào mừng bạn quay lại với Ticketbox Clone</p>
        </div>

        <div class="social-login">
            <button class="btn-social google"><i class="fa-brands fa-google"></i> Google</button>
            <button class="btn-social facebook"><i class="fa-brands fa-facebook-f"></i> Facebook</button>
        </div>

        <div class="divider">HOẶC BẰNG EMAIL</div>

        <form id="loginForm">
            <div class="form-group" id="grp-email">
                <label>Email của bạn</label>
                <input type="text" id="email" placeholder="Nhập địa chỉ email">
                <div class="error-msg" id="err-email">Vui lòng nhập email</div>
            </div>

            <div class="form-group" id="grp-pwd">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
                <i class="fa-regular fa-eye toggle-pwd" onclick="togglePassword('password', this)"></i>
                <div class="error-msg" id="err-pwd">Vui lòng nhập mật khẩu</div>
            </div>
            
            <div class="error-msg" id="err-global" style="text-align: center; margin-bottom: 15px; font-size: 14px;"></div>

            <button type="submit" class="btn-submit">Đăng Nhập</button>
        </form>

        <div class="form-footer">
            Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>

    <script>
        // 1. Hàm Ẩn/Hiện mật khẩu
        function togglePassword(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                iconElement.classList.remove('fa-eye');
                iconElement.classList.add('
