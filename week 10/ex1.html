<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day in month</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

:root{
    --bg:#0f1722;
    --bg-light:#16202e;
    --card:#1e293b;
    --soft:#243145;
    --accent:#3b82f6;
    --today:#ef4444;
    --text:#e5e7eb;
    --muted:#9ca3af;
}

*{box-sizing:border-box}

body{
    margin:0;
    font-family:'Plus Jakarta Sans',sans-serif;
    background:
        radial-gradient(circle at 30% 20%, #1e293b 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, #1f2a3d 0%, transparent 50%),
        linear-gradient(135deg,var(--bg-light),var(--bg));
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.calendar-card{
    width:440px;
    padding:32px;
    border-radius:28px;
    background:var(--card);
    box-shadow:
        0 15px 40px rgba(0,0,0,0.4);
}

.controls{
    display:flex;
    gap:14px;
    margin-bottom:28px;
}

select{
    flex:1;
    padding:10px 14px;
    border-radius:12px;
    border:1px solid #334155;
    background:#1e293b;
    color:var(--text);
    font-size:.9rem;
    transition:.2s;
}

select:hover{
    border-color:var(--accent);
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
}

.weekday{
    text-align:center;
    font-size:.75rem;
    color:var(--muted);
    font-weight:600;
    margin-bottom:8px;
}

.day{
    aspect-ratio:1/1;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:1rem;
    color:var(--text);
    background:var(--soft);
    transition:.25s ease;
}

.day:hover{
    transform:translateY(-3px);
    background:#2f3e57;
}

.day.selected{
    background:var(--accent);
    color:#fff;
    font-weight:700;
    box-shadow:0 8px 18px rgba(59,130,246,0.4);
}

.day.is-today{
    border:2px solid var(--today);
    color:var(--today);
    font-weight:600;
}

.detail-box{
    margin-top:28px;
    padding:24px;
    border-radius:22px;
    background:#1f2b3f;
    border:1px solid #334155;
    display:none;
    animation:fade .3s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
}

.big-date{
    font-size:2.6rem;
    font-weight:700;
    color:#60a5fa;
}
.duong-lich{
    font-size:0.9rem;
    color:#cbd5e1;
    margin-top:4px;
}
.tag-cc{
    display:inline-block;
    margin:12px 0;
    padding:6px 14px;
    border-radius:10px;
    background:rgba(59,130,246,0.15);
    color:#60a5fa;
    font-size:.85rem;
    font-weight:600;
}

.weather-line{
    margin-top:16px;
    font-size:.85rem;
    color:var(--muted);
}

.close-btn{
    position:absolute;
    right:18px;
    top:18px;
    cursor:pointer;
    opacity:.6;
}

.close-btn:hover{opacity:1}
</style>
</head>
<body>

<div class="calendar-card">
    <div class="controls">
        <select id="month" onchange="render()"></select>
        <select id="year" onchange="render()"></select>
    </div>
    <div class="grid" id="grid"></div>
    <div id="detail" class="detail-box"></div>
</div>

<script>
const CAN = ["Giáp","Ất","Bính","Đinh","Mậu","Kỷ","Canh","Tân","Nhâm","Quý"];
const CHI = ["Tý","Sửu","Dần","Mão","Thìn","Tỵ","Ngọ","Mùi","Thân","Dậu","Tuất","Hợi"];
const GIO_HD = {"Tý":"Tý, Sửu, Mão, Ngọ, Thân, Dậu","Sửu":"Dần, Mão, Tỵ, Thân, Tuất, Hợi","Dần":"Tý, Sửu, Thìn, Tỵ, Mùi, Tuất","Mão":"Tý, Dần, Mão, Ngọ, Mùi, Dậu","Thìn":"Dần, Thìn, Tỵ, Thân, Dậu, Hợi","Tỵ":"Sửu, Thìn, Ngọ, Mùi, Tuất, Hợi","Ngọ":"Tý, Sửu, Mão, Ngọ, Thân, Dậu","Mùi":"Dần, Mão, Tỵ, Thân, Tuất, Hợi","Thân":"Tý, Sửu, Thìn, Tỵ, Mùi, Tuất","Dậu":"Tý, Dần, Mão, Ngọ, Mùi, Dậu","Tuất":"Dần, Thìn, Tỵ, Thân, Dậu, Hợi","Hợi":"Sửu, Thìn, Ngọ, Mùi, Tuất, Hợi"};

let selectedKey = null;
let currentWeather = "Đang tải...";

async function initWeather() {
    try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=20.54&longitude=105.91&current_weather=true`);
        const data = await res.json();
        currentWeather = `🌡️ ${Math.round(data.current_weather.temperature)}°C • Phủ Lý, Hà Nam`;
    } catch { currentWeather = "🌡️ 24°C • Phủ Lý"; }
}

function jdFromDate(d, m, y){
    let a=Math.floor((14-m)/12), y1=y+4800-a, m1=m+12*a-3;
    return d+Math.floor((153*m1+2)/5)+365*y1+Math.floor(y1/4)-Math.floor(y1/100)+Math.floor(y1/400)-32045;
}

function showDetail(d, m, y, key){
    const box = document.getElementById("detail");
    if(selectedKey === key) {
        selectedKey = null;
        box.style.display = 'none';
        render();
        return;
    }
    selectedKey = key;
    render();

    const jd = jdFromDate(d, m, y);
    const cc = CAN[(jd+9)%10] + " " + CHI[(jd+1)%12];

    box.innerHTML = `
        <span class="close-btn" onclick="closeDetail()">✕</span>
        <div class="big-date">${d < 10 ? '0'+d : d}.${m < 10 ? '0'+m : m}</div>
        <div class="duong-lich"> Dương lịch năm ${y}</div>
        <div class="tag-cc">Ngày ${cc}</div>
        <div style="font-size:0.8rem; color:#8b949e; line-height:1.4">
            <b style="color:var(--accent)">Giờ Hoàng Đạo:</b><br>${GIO_HD[cc.split(' ')[1]]}
        </div>
        <div class="weather-line">${currentWeather}</div>
    `;
    box.style.display = "block";
}

function closeDetail() {
    selectedKey = null;
    document.getElementById('detail').style.display='none';
    render();
}

function render(){
    const m = parseInt(document.getElementById("month").value);
    const y = parseInt(document.getElementById("year").value);
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    ["T2","T3","T4","T5","T6","T7","CN"].forEach(w => grid.innerHTML += `<div class="weekday">${w}</div>`);

    const first = new Date(y, m-1, 1).getDay();
    const start = (first === 0) ? 6 : first - 1;
    const total = new Date(y, m, 0).getDate();
    const today = new Date();

    for(let i=0; i<start; i++) grid.innerHTML += `<div></div>`;

    for(let d=1; d<=total; d++){
        const key = `${d}-${m}-${y}`;
        const isToday = today.getDate()===d && today.getMonth()+1===m && today.getFullYear()===y;
        const cell = document.createElement("div");
        cell.className = `day ${selectedKey === key ? 'selected' : ''} ${isToday ? 'is-today' : ''}`;
        cell.innerHTML = d;
        cell.onclick = () => showDetail(d, m, y, key);
        grid.appendChild(cell);
    }
}

function init(){
    const ms = document.getElementById("month"), ys = document.getElementById("year");
    const names = ["Tháng 1","Tháng 2","Tháng 3","Tháng 4","Tháng 5","Tháng 6","Tháng 7","Tháng 8","Tháng 9","Tháng 10","Tháng 11","Tháng 12"];
    names.forEach((n, i) => ms.innerHTML += `<option value="${i+1}">${n}</option>`);
    for(let i=2020; i<=2035; i++) ys.innerHTML += `<option value="${i}">Năm ${i}</option>`;
    
    const now = new Date();
    ms.value = now.getMonth() + 1;
    ys.value = now.getFullYear();
    initWeather();
    render();
}
window.onload = init;
</script>
</body>
</html>
